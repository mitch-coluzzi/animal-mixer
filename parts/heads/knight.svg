<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Knight Helmet - Cute cartoony Nick Jr. style -->

  <!-- Red plume/feather on top -->
  <ellipse cx="200" cy="42" rx="18" ry="12" fill="#FF3333" stroke="#222" stroke-width="3.5"/>
  <ellipse cx="200" cy="34" rx="14" ry="10" fill="#FF3333" stroke="#222" stroke-width="3.5"/>
  <ellipse cx="200" cy="28" rx="9" ry="7" fill="#FF5555" stroke="#222" stroke-width="3"/>
  <!-- Plume base -->
  <rect x="190" y="48" width="20" height="12" rx="4" fill="#FF3333" stroke="#222" stroke-width="3"/>

  <!-- Helmet dome (round, friendly) -->
  <path d="M110,140 Q110,58 200,55 Q290,58 290,140 L290,170 Q290,195 270,210 L130,210 Q110,195 110,170 Z"
        fill="#B0B0B0" stroke="#222" stroke-width="4" stroke-linejoin="round"/>

  <!-- Helmet side rivets -->
  <circle cx="125" cy="120" r="5" fill="#808080" stroke="#222" stroke-width="2.5"/>
  <circle cx="275" cy="120" r="5" fill="#808080" stroke="#222" stroke-width="2.5"/>
  <circle cx="125" cy="155" r="5" fill="#808080" stroke="#222" stroke-width="2.5"/>
  <circle cx="275" cy="155" r="5" fill="#808080" stroke="#222" stroke-width="2.5"/>

  <!-- Helmet top ridge -->
  <path d="M170,58 Q200,45 230,58" fill="none" stroke="#808080" stroke-width="4" stroke-linecap="round"/>

  <!-- Visor opening (T-shape / horizontal slit with friendly shape) -->
  <path d="M140,125 Q145,115 200,113 Q255,115 260,125 L260,160 Q255,172 200,175 Q145,172 140,160 Z"
        fill="#3A3A3A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Visor raised lip (top edge) -->
  <path d="M138,125 Q145,113 200,110 Q255,113 262,125"
        fill="none" stroke="#808080" stroke-width="4" stroke-linecap="round"/>

  <!-- Left eye (cute cartoon eye peeking through visor) -->
  <ellipse cx="172" cy="140" rx="16" ry="18" fill="white" stroke="#222" stroke-width="3"/>
  <ellipse cx="175" cy="141" rx="9" ry="10" fill="#4A3728"/>
  <ellipse cx="177" cy="138" rx="4" ry="4.5" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="228" cy="140" rx="16" ry="18" fill="white" stroke="#222" stroke-width="3"/>
  <ellipse cx="231" cy="141" rx="9" ry="10" fill="#4A3728"/>
  <ellipse cx="233" cy="138" rx="4" ry="4.5" fill="white"/>

  <!-- Cute smile visible through visor -->
  <path d="M180,162 Q200,175 220,162" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Cheek blush (through visor) -->
  <ellipse cx="160" cy="158" rx="8" ry="5" fill="#FFB0B0" opacity="0.6"/>
  <ellipse cx="240" cy="158" rx="8" ry="5" fill="#FFB0B0" opacity="0.6"/>

  <!-- Chin guard / bottom of helmet -->
  <path d="M130,210 Q130,220 200,220 Q270,220 270,210"
        fill="#808080" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Ear guards -->
  <path d="M110,130 Q95,135 93,155 Q95,175 110,175" fill="#808080" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M290,130 Q305,135 307,155 Q305,175 290,175" fill="#808080" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
</svg>