<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Frog Head - compact, upper canvas only -->
  <!-- Big bulging eyes on top -->
  <circle cx="155" cy="62" r="34" fill="#5DBB63" stroke="#222" stroke-width="3.5"/>
  <circle cx="155" cy="60" r="24" fill="#FFFFFF" stroke="#222" stroke-width="2.5"/>
  <circle cx="155" cy="63" r="14" fill="#2A5A20"/>
  <circle cx="150" cy="57" r="5" fill="#FFFFFF"/>
  <circle cx="245" cy="62" r="34" fill="#5DBB63" stroke="#222" stroke-width="3.5"/>
  <circle cx="245" cy="60" r="24" fill="#FFFFFF" stroke="#222" stroke-width="2.5"/>
  <circle cx="245" cy="63" r="14" fill="#2A5A20"/>
  <circle cx="240" cy="57" r="5" fill="#FFFFFF"/>

  <!-- Head shape - wide and flat -->
  <path d="M110,120 C108,95 130,82 155,88 C175,92 190,94 200,94 C210,94 225,92 245,88 C270,82 292,95 290,120 C292,155 288,180 272,198 C258,212 232,220 200,222 C168,220 142,212 128,198 C112,180 108,155 110,120Z" fill="#5DBB63" stroke="#222" stroke-width="3.5"/>

  <!-- Lighter throat area -->
  <ellipse cx="200" cy="175" rx="58" ry="35" fill="#A8E8A0" stroke="none"/>

  <!-- Nostrils -->
  <ellipse cx="180" cy="128" rx="5" ry="4" fill="#3A9940" stroke="#222" stroke-width="2"/>
  <ellipse cx="220" cy="128" rx="5" ry="4" fill="#3A9940" stroke="#222" stroke-width="2"/>

  <!-- Big wide mouth -->
  <path d="M135,170 C150,195 175,208 200,210 C225,208 250,195 265,170" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Mouth corners -->
  <path d="M132,170 C130,164 133,161 137,164" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M268,170 C270,164 267,161 263,164" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="135" cy="155" rx="12" ry="8" fill="#90D890" opacity="0.6"/>
  <ellipse cx="265" cy="155" rx="12" ry="8" fill="#90D890" opacity="0.6"/>

  <!-- Spots on forehead -->
  <circle cx="182" cy="108" r="6" fill="#3A9940" opacity="0.4"/>
  <circle cx="218" cy="108" r="6" fill="#3A9940" opacity="0.4"/>
  <circle cx="200" cy="102" r="4.5" fill="#3A9940" opacity="0.3"/>

</svg>