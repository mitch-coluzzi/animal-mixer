<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Monkey Head -->
  <!-- Ears - big round -->
  <circle cx="72" cy="215" r="52" fill="#C8824A" stroke="#222" stroke-width="3.5"/>
  <circle cx="72" cy="215" r="32" fill="#F0C8A0" stroke="none"/>
  <circle cx="328" cy="215" r="52" fill="#C8824A" stroke="#222" stroke-width="3.5"/>
  <circle cx="328" cy="215" r="32" fill="#F0C8A0" stroke="none"/>

  <!-- Head shape - round -->
  <ellipse cx="200" cy="220" rx="130" ry="150" fill="#C8824A" stroke="#222" stroke-width="3.5"/>

  <!-- Hair tuft on top -->
  <path d="M170,78 C175,55 185,45 195,50 C192,40 200,30 210,38 C215,28 228,32 225,48 C235,42 240,55 232,68 C240,65 242,78 235,85" fill="#A86030" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Face/muzzle area - lighter oval -->
  <ellipse cx="200" cy="280" rx="90" ry="85" fill="#F0D0A8" stroke="#222" stroke-width="2.5"/>

  <!-- Eyes - big round cute -->
  <ellipse cx="160" cy="210" rx="28" ry="30" fill="#FFFFFF" stroke="#222" stroke-width="3"/>
  <ellipse cx="160" cy="214" rx="16" ry="18" fill="#3A2010"/>
  <ellipse cx="155" cy="207" rx="6" ry="7" fill="#FFFFFF"/>
  <ellipse cx="240" cy="210" rx="28" ry="30" fill="#FFFFFF" stroke="#222" stroke-width="3"/>
  <ellipse cx="240" cy="214" rx="16" ry="18" fill="#3A2010"/>
  <ellipse cx="235" cy="207" rx="6" ry="7" fill="#FFFFFF"/>

  <!-- Eyebrows -->
  <path d="M135,184 C145,175 170,173 185,178" fill="none" stroke="#A86030" stroke-width="3" stroke-linecap="round"/>
  <path d="M215,178 C230,173 255,175 265,184" fill="none" stroke="#A86030" stroke-width="3" stroke-linecap="round"/>

  <!-- Nose - small round nostrils -->
  <ellipse cx="190" cy="275" rx="10" ry="8" fill="#A86030" stroke="#222" stroke-width="2"/>
  <ellipse cx="210" cy="275" rx="10" ry="8" fill="#A86030" stroke="#222" stroke-width="2"/>

  <!-- Mouth - big friendly grin -->
  <path d="M160,310 C170,335 185,345 200,345 C215,345 230,335 240,310" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Tongue hint -->
  <path d="M185,335 C190,345 200,348 210,345 C215,340 215,335 210,332 C205,330 195,330 190,332 C187,334 185,335 185,335Z" fill="#E87070" stroke="none"/>

  <!-- Cheek blush -->
  <ellipse cx="135" cy="260" rx="15" ry="10" fill="#E8A080" opacity="0.4"/>
  <ellipse cx="265" cy="260" rx="15" ry="10" fill="#E8A080" opacity="0.4"/>

  <!-- Neck -->
  <path d="M155,390 C165,410 182,420 200,422 C218,420 235,410 245,390 L252,418 C238,428 220,432 200,432 C180,432 162,428 148,418Z" fill="#C8824A" stroke="#222" stroke-width="3"/>
</svg>