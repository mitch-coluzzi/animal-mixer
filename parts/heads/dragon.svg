<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Dragon Head - Friendly, cute, kid-friendly -->

  <!-- Left ear fin -->
  <path d="M 95 120 Q 70 95 80 65 Q 95 85 115 100 Z" fill="#6A5ACD" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right ear fin -->
  <path d="M 305 120 Q 330 95 320 65 Q 305 85 285 100 Z" fill="#6A5ACD" stroke="#333" stroke-width="3" stroke-linejoin="round"/>

  <!-- Main head shape - big round friendly -->
  <ellipse cx="200" cy="135" rx="115" ry="100" fill="#7B68EE" stroke="#333" stroke-width="3.5"/>

  <!-- Left horn -->
  <path d="M 155 48 Q 148 15 160 5 Q 168 25 172 50" fill="#FFD700" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right horn -->
  <path d="M 245 48 Q 252 15 240 5 Q 232 25 228 50" fill="#FFD700" stroke="#333" stroke-width="3" stroke-linejoin="round"/>

  <!-- Snout - rounded, friendly bump -->
  <ellipse cx="200" cy="175" rx="65" ry="42" fill="#7B68EE" stroke="#333" stroke-width="3.5"/>
  <!-- Snout lighter underside -->
  <ellipse cx="200" cy="182" rx="50" ry="28" fill="#98FB98" stroke="none"/>

  <!-- Eyes - big, cute, sparkly -->
  <!-- Left eye white -->
  <ellipse cx="160" cy="115" rx="28" ry="30" fill="white" stroke="#333" stroke-width="3"/>
  <!-- Left eye iris -->
  <ellipse cx="163" cy="118" rx="16" ry="18" fill="#4B0082"/>
  <!-- Left eye pupil -->
  <ellipse cx="165" cy="120" rx="8" ry="9" fill="#111"/>
  <!-- Left eye sparkle -->
  <circle cx="155" cy="110" r="5" fill="white"/>
  <circle cx="170" cy="122" r="2.5" fill="white"/>

  <!-- Right eye white -->
  <ellipse cx="240" cy="115" rx="28" ry="30" fill="white" stroke="#333" stroke-width="3"/>
  <!-- Right eye iris -->
  <ellipse cx="237" cy="118" rx="16" ry="18" fill="#4B0082"/>
  <!-- Right eye pupil -->
  <ellipse cx="235" cy="120" rx="8" ry="9" fill="#111"/>
  <!-- Right eye sparkle -->
  <circle cx="245" cy="110" r="5" fill="white"/>
  <circle cx="230" cy="122" r="2.5" fill="white"/>

  <!-- Cute eyebrows -->
  <path d="M 135 88 Q 155 78 180 85" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <path d="M 265 88 Q 245 78 220 85" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>

  <!-- Nostrils -->
  <ellipse cx="185" cy="172" rx="6" ry="5" fill="#6A5ACD" stroke="#333" stroke-width="2"/>
  <ellipse cx="215" cy="172" rx="6" ry="5" fill="#6A5ACD" stroke="#333" stroke-width="2"/>

  <!-- Tiny smoke puffs from left nostril -->
  <circle cx="175" cy="160" r="4" fill="#D3D3D3" opacity="0.6"/>
  <circle cx="168" cy="152" r="3" fill="#D3D3D3" opacity="0.4"/>
  <circle cx="164" cy="145" r="2.5" fill="#D3D3D3" opacity="0.25"/>

  <!-- Tiny smoke puffs from right nostril -->
  <circle cx="225" cy="160" r="4" fill="#D3D3D3" opacity="0.6"/>
  <circle cx="232" cy="152" r="3" fill="#D3D3D3" opacity="0.4"/>
  <circle cx="236" cy="145" r="2.5" fill="#D3D3D3" opacity="0.25"/>

  <!-- Wide friendly grin -->
  <path d="M 155 195 Q 175 218 200 220 Q 225 218 245 195" fill="none" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Mouth interior for open smile -->
  <path d="M 162 197 Q 180 215 200 216 Q 220 215 238 197 Q 220 208 200 210 Q 180 208 162 197 Z" fill="#FF6B8A" stroke="none"/>
  <!-- Two small fang teeth peeking from grin -->
  <ellipse cx="175" cy="200" rx="4" ry="3.5" fill="white" stroke="#333" stroke-width="1"/>
  <ellipse cx="225" cy="200" rx="4" ry="3.5" fill="white" stroke="#333" stroke-width="1"/>

  <!-- Cheek blush spots -->
  <ellipse cx="120" cy="155" rx="15" ry="10" fill="#FF9EC6" opacity="0.5"/>
  <ellipse cx="280" cy="155" rx="15" ry="10" fill="#FF9EC6" opacity="0.5"/>
</svg>