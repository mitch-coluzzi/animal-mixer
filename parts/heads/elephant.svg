<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Elephant Head - Nick Jr. cartoony style, Dumbo ears -->

  <!-- LEFT EAR (behind head) - huge floppy Dumbo style -->
  <path d="M170,100 C140,70 80,60 55,90 C30,120 25,170 40,210 C55,250 90,260 120,240 C140,225 155,195 160,165"
    fill="#C8A87A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left inner ear -->
  <path d="M160,110 C138,85 95,78 72,100 C50,125 48,165 58,198 C68,228 95,238 115,224 C132,212 148,188 155,160"
    fill="#E8C8A0" stroke="none"/>

  <!-- RIGHT EAR (behind head) - huge floppy Dumbo style -->
  <path d="M230,100 C260,70 320,60 345,90 C370,120 375,170 360,210 C345,250 310,260 280,240 C260,225 245,195 240,165"
    fill="#C8A87A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right inner ear -->
  <path d="M240,110 C262,85 305,78 328,100 C350,125 352,165 342,198 C332,228 305,238 285,224 C268,212 252,188 245,160"
    fill="#E8C8A0" stroke="none"/>

  <!-- Head shape - round, cute, centered at x=200, y=30 to y=220 -->
  <ellipse cx="200" cy="130" rx="80" ry="90" fill="#C8A87A" stroke="#222" stroke-width="3.5"/>

  <!-- Eyes - big and cute -->
  <ellipse cx="170" cy="115" rx="18" ry="21" fill="#FFFFFF" stroke="#222" stroke-width="3"/>
  <ellipse cx="170" cy="119" rx="11" ry="12" fill="#3A2820"/>
  <ellipse cx="165" cy="112" rx="4.5" ry="5.5" fill="#FFFFFF"/>
  <ellipse cx="230" cy="115" rx="18" ry="21" fill="#FFFFFF" stroke="#222" stroke-width="3"/>
  <ellipse cx="230" cy="119" rx="11" ry="12" fill="#3A2820"/>
  <ellipse cx="225" cy="112" rx="4.5" ry="5.5" fill="#FFFFFF"/>

  <!-- Eyebrows - friendly arches -->
  <path d="M153,96 C160,89 175,87 183,92" fill="none" stroke="#A88A5A" stroke-width="3" stroke-linecap="round"/>
  <path d="M217,92 C225,87 240,89 247,96" fill="none" stroke="#A88A5A" stroke-width="3" stroke-linecap="round"/>

  <!-- Trunk - short, ending by y=210 -->
  <path d="M191,158 C189,168 187,180 189,194 C191,204 196,210 200,210 C204,210 209,204 211,194 C213,180 211,168 209,158"
    fill="#C8A87A" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Trunk inner highlight -->
  <path d="M195,160 C194,170 193,182 194,196 C196,206 199,209 200,209 C201,209 204,206 206,196 C207,182 206,170 205,160"
    fill="#E8C8A0" stroke="none"/>
  <!-- Trunk tip curl -->
  <path d="M211,194 C216,198 219,194 217,189" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Smile - friendly, on each side of the trunk -->
  <path d="M160,165 C168,176 180,180 190,175" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M240,165 C232,176 220,180 210,175" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="148" cy="148" rx="14" ry="9" fill="#E8A090" opacity="0.45"/>
  <ellipse cx="252" cy="148" rx="14" ry="9" fill="#E8A090" opacity="0.45"/>

</svg>
