<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Bear Body - chunky and fluffy -->
  <!-- Main torso - big chunky shape -->
  <ellipse cx="200" cy="235" rx="140" ry="150" fill="#8B6914" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Fluffy shoulder - left -->
  <ellipse cx="85" cy="145" rx="58" ry="54" fill="#8B6914" stroke="#222" stroke-width="3.5"/>
  <!-- Fluffy shoulder - right -->
  <ellipse cx="315" cy="145" rx="58" ry="54" fill="#8B6914" stroke="#222" stroke-width="3.5"/>
  <!-- Neck connector -->
  <rect x="135" y="75" width="130" height="65" rx="16" fill="#8B6914" stroke="none"/>
  <!-- Torso overlay to clean joins -->
  <ellipse cx="200" cy="235" rx="137" ry="147" fill="#8B6914" stroke="none"/>
  <!-- Belly patch - lighter brown -->
  <ellipse cx="200" cy="260" rx="90" ry="100" fill="#A8842A" stroke="none"/>
  <!-- Inner belly - even lighter -->
  <ellipse cx="200" cy="275" rx="65" ry="75" fill="#C4A44E" stroke="none"/>
  <!-- Fluffy texture bumps on edges -->
  <path d="M68 170 Q62 180 68 192" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72 200 Q65 212 72 225" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M332 170 Q338 180 332 192" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M328 200 Q335 212 328 225" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chest fluff tufts -->
  <path d="M170 145 Q180 130 190 145" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M195 140 Q205 125 215 140" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M220 145 Q230 130 240 145" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <!-- Fluffy edge bumps - bottom -->
  <path d="M110 350 Q105 360 112 368" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M288 350 Q295 360 288 368" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <!-- Re-draw main outline -->
  <ellipse cx="200" cy="235" rx="140" ry="150" fill="none" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Shoulder outlines -->
  <path d="M88 92 Q30 115 32 165 Q34 200 58 200" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M312 92 Q370 115 368 165 Q366 200 342 200" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
</svg>