<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Bear Body - chunky and fluffy -->
  <!-- Main torso -->
  <ellipse cx="200" cy="265" rx="105" ry="115" fill="#8B6914" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Fluffy shoulder - left -->
  <ellipse cx="110" cy="178" rx="42" ry="38" fill="#8B6914" stroke="#222" stroke-width="3.5"/>
  <!-- Fluffy shoulder - right -->
  <ellipse cx="290" cy="178" rx="42" ry="38" fill="#8B6914" stroke="#222" stroke-width="3.5"/>
  <!-- Torso overlay to clean joins -->
  <ellipse cx="200" cy="265" rx="102" ry="112" fill="#8B6914" stroke="none"/>
  <!-- Belly patch - lighter brown -->
  <ellipse cx="200" cy="278" rx="68" ry="78" fill="#A8842A" stroke="none"/>
  <!-- Inner belly - even lighter -->
  <ellipse cx="200" cy="290" rx="48" ry="55" fill="#C4A44E" stroke="none"/>
  <!-- Fluffy texture bumps on edges -->
  <path d="M100 215 Q95 224 100 234" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M104 242 Q98 253 104 264" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M300 215 Q305 224 300 234" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M296 242 Q302 253 296 264" fill="none" stroke="#6B4A0A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chest fluff tufts -->
  <path d="M172 175 Q180 163 188 175" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M192 170 Q200 158 208 170" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M212 175 Q220 163 228 175" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <!-- Fluffy edge bumps - bottom -->
  <path d="M135 355 Q130 363 136 370" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M265 355 Q270 363 264 370" fill="none" stroke="#6B4A0A" stroke-width="2" stroke-linecap="round"/>
  <!-- Re-draw main outline -->
  <ellipse cx="200" cy="265" rx="105" ry="115" fill="none" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Shoulder outlines -->
  <path d="M112 141 Q72 155 74 192 Q76 215 92 218" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M288 141 Q328 155 326 192 Q324 215 308 218" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
</svg>