<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Tiger Body -->
  <!-- Main torso -->
  <ellipse cx="200" cy="265" rx="100" ry="115" fill="#E8823A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Belly - lighter orange -->
  <ellipse cx="200" cy="280" rx="65" ry="80" fill="#F4B67A" stroke="none"/>
  <!-- Left shoulder bump -->
  <ellipse cx="115" cy="175" rx="38" ry="32" fill="#E8823A" stroke="#222" stroke-width="3.5"/>
  <!-- Right shoulder bump -->
  <ellipse cx="285" cy="175" rx="38" ry="32" fill="#E8823A" stroke="#222" stroke-width="3.5"/>
  <!-- Torso overlay to clean shoulder joins -->
  <ellipse cx="200" cy="265" rx="97" ry="112" fill="#E8823A" stroke="none"/>
  <!-- Belly again on top -->
  <ellipse cx="200" cy="280" rx="65" ry="80" fill="#F4B67A" stroke="none"/>
  <!-- Tiger stripes - left side -->
  <path d="M108 210 Q125 216 118 238" fill="none" stroke="#D06A28" stroke-width="5" stroke-linecap="round"/>
  <path d="M103 255 Q122 264 115 285" fill="none" stroke="#D06A28" stroke-width="5" stroke-linecap="round"/>
  <path d="M108 300 Q125 310 118 330" fill="none" stroke="#D06A28" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Tiger stripes - right side -->
  <path d="M292 210 Q275 216 282 238" fill="none" stroke="#D06A28" stroke-width="5" stroke-linecap="round"/>
  <path d="M297 255 Q278 264 285 285" fill="none" stroke="#D06A28" stroke-width="5" stroke-linecap="round"/>
  <path d="M292 300 Q275 310 282 330" fill="none" stroke="#D06A28" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Tiger stripes - top back -->
  <path d="M175 162 Q192 170 183 188" fill="none" stroke="#D06A28" stroke-width="4" stroke-linecap="round"/>
  <path d="M225 162 Q208 170 217 188" fill="none" stroke="#D06A28" stroke-width="4" stroke-linecap="round"/>
  <!-- Re-draw main outline on top -->
  <ellipse cx="200" cy="265" rx="100" ry="115" fill="none" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Shoulder outlines on top -->
  <path d="M118 144 Q82 158 85 190 Q88 210 100 212" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M282 144 Q318 158 315 190 Q312 210 300 212" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
</svg>