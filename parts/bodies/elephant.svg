<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Elephant Body - wide and round -->
  <!-- Main torso - extra wide -->
  <ellipse cx="200" cy="268" rx="110" ry="112" fill="#C8A87A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Big round belly -->
  <ellipse cx="200" cy="285" rx="78" ry="82" fill="#DBBF9A" stroke="none"/>
  <!-- Left shoulder - big and round -->
  <ellipse cx="105" cy="180" rx="42" ry="38" fill="#C8A87A" stroke="#222" stroke-width="3.5"/>
  <!-- Right shoulder - big and round -->
  <ellipse cx="295" cy="180" rx="42" ry="38" fill="#C8A87A" stroke="#222" stroke-width="3.5"/>
  <!-- Torso overlay to clean joins -->
  <ellipse cx="200" cy="268" rx="107" ry="109" fill="#C8A87A" stroke="none"/>
  <!-- Belly again on top -->
  <ellipse cx="200" cy="285" rx="78" ry="82" fill="#DBBF9A" stroke="none"/>
  <!-- Belly button -->
  <ellipse cx="200" cy="310" rx="5" ry="7" fill="none" stroke="#A88A5A" stroke-width="2.5"/>
  <!-- Skin wrinkle lines -->
  <path d="M160 248 Q178 243 196 248" fill="none" stroke="#A88A5A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M204 248 Q222 243 240 248" fill="none" stroke="#A88A5A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Wrinkle near shoulders -->
  <path d="M128 205 Q136 197 144 205" fill="none" stroke="#A88A5A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 205 Q264 197 272 205" fill="none" stroke="#A88A5A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Re-draw main outline -->
  <ellipse cx="200" cy="268" rx="110" ry="112" fill="none" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Shoulder outlines -->
  <path d="M108 143 Q68 158 70 195 Q72 220 88 222" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M292 143 Q332 158 330 195 Q328 220 312 222" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
</svg>