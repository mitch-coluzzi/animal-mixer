<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Rubber Ducky Body - chubby and adorable -->
  <!-- Main body - big round chubby shape -->
  <ellipse cx="200" cy="268" rx="105" ry="112" fill="#FFD700" stroke="#222" stroke-width="3.5"/>
  <!-- Belly patch - lighter yellow oval -->
  <ellipse cx="200" cy="282" rx="70" ry="82" fill="#FFF0A0" stroke="none"/>
  <!-- Left wing nub - cute rounded bump -->
  <path d="M100,222 C84,230 78,252 80,270 C82,288 92,300 104,300 C110,298 112,292 110,280" fill="#FFD700" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Wing detail lines - left -->
  <path d="M90,248 C88,260 89,273 95,282" fill="none" stroke="#FFC000" stroke-width="3" stroke-linecap="round"/>
  <path d="M98,242 C96,256 97,268 102,276" fill="none" stroke="#FFC000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right wing nub - cute rounded bump -->
  <path d="M300,222 C316,230 322,252 320,270 C318,288 308,300 296,300 C290,298 288,292 290,280" fill="#FFD700" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Wing detail lines - right -->
  <path d="M310,248 C312,260 311,273 305,282" fill="none" stroke="#FFC000" stroke-width="3" stroke-linecap="round"/>
  <path d="M302,242 C304,256 303,268 298,276" fill="none" stroke="#FFC000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Belly highlight line -->
  <path d="M150,228 C162,218 182,214 200,212 C218,214 238,218 250,228" fill="none" stroke="#FFE44D" stroke-width="3" stroke-linecap="round"/>
  <!-- Belly button -->
  <circle cx="200" cy="305" r="3.5" fill="#FFC000" stroke="#E8B400" stroke-width="2"/>
  <!-- Re-draw main outline on top -->
  <ellipse cx="200" cy="268" rx="105" ry="112" fill="none" stroke="#222" stroke-width="3.5"/>
</svg>