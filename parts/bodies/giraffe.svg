  <ellipse cx="122" cy="178" rx="35" ry="30" fill="#F5C858" stroke="#222" stroke-width="3.5"/>
  <!-- Right shoulder -->
  <ellipse cx="278" cy="178" rx="35" ry="30" fill="#F5C858" stroke="#222" stroke-width="3.5"/>
  <!-- Torso overlay to clean joins -->
  <ellipse cx="200" cy="268" rx="87" ry="115" fill="#F5C858" stroke="none"/>
  <!-- Belly - lighter yellow -->
  <ellipse cx="200" cy="285" rx="60" ry="85" fill="#FBE08A" stroke="none"/>
  <!-- Giraffe spots - scattered across body -->
  <ellipse cx="145" cy="210" rx="14" ry="12" fill="#C8A020" stroke="none" transform="rotate(-10 145 210)"/>
  <ellipse cx="252" cy="205" rx="13" ry="11" fill="#C8A020" stroke="none" transform="rotate(8 252 205)"/>
  <ellipse cx="155" cy="268" rx="12" ry="14" fill="#C8A020" stroke="none" transform="rotate(5 155 268)"/>
  <ellipse cx="248" cy="272" rx="14" ry="11" fill="#C8A020" stroke="none" transform="rotate(-7 248 272)"/>
  <ellipse cx="132" cy="310" rx="11" ry="13" fill="#C8A020" stroke="none" transform="rotate(12 132 310)"/>
  <ellipse cx="268" cy="318" rx="12" ry="10" fill="#C8A020" stroke="none" transform="rotate(-5 268 318)"/>
  <ellipse cx="198" cy="330" rx="13" ry="11" fill="#C8A020" stroke="none" transform="rotate(3 198 330)"/>
  <ellipse cx="168" cy="355" rx="10" ry="12" fill="#C8A020" stroke="none" transform="rotate(-8 168 355)"/>
  <ellipse cx="232" cy="358" rx="11" ry="9" fill="#C8A020" stroke="none" transform="rotate(6 232 358)"/>
  <ellipse cx="200" cy="192" rx="11" ry="10" fill="#C8A020" stroke="none"/>
