  <ellipse cx="285" cy="172" rx="8" ry="7" fill="#C8A020" stroke="none" transform="rotate(10 285 172)"/>
  <!-- Re-draw main outline -->
  <ellipse cx="200" cy="268" rx="90" ry="118" fill="none" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Shoulder outlines -->
  <path d="M124 149 Q92 162 94 192 Q96 215 108 217" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M276 149 Q308 162 306 192 Q304 215 292 217" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
