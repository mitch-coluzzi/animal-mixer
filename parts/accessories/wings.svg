<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Colorful Butterfly/Fairy Wings at mid-body, spreading to both sides -->

  <!-- LEFT WING -->
  <!-- Upper left wing lobe -->
  <path d="M190,195 Q130,140 80,155 Q40,170 55,210 Q70,240 140,230 Q175,220 190,210 Z"
        fill="#FF69B4" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Lower left wing lobe -->
  <path d="M190,210 Q140,230 95,260 Q60,280 80,310 Q100,330 145,300 Q175,270 190,240 Z"
        fill="#87CEEB" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left wing inner details -->
  <path d="M185,200 Q145,165 105,178 Q80,188 95,210 Q115,228 160,218 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>
  <path d="M185,218 Q150,240 120,268 Q100,282 115,298 Q135,300 160,275 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>

  <!-- RIGHT WING -->
  <!-- Upper right wing lobe -->
  <path d="M210,195 Q270,140 320,155 Q360,170 345,210 Q330,240 260,230 Q225,220 210,210 Z"
        fill="#FF69B4" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Lower right wing lobe -->
  <path d="M210,210 Q260,230 305,260 Q340,280 320,310 Q300,330 255,300 Q225,270 210,240 Z"
        fill="#87CEEB" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right wing inner details -->
  <path d="M215,200 Q255,165 295,178 Q320,188 305,210 Q285,228 240,218 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>
  <path d="M215,218 Q250,240 280,268 Q300,282 285,298 Q265,300 240,275 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>

  <!-- Wing body/center attachment -->
  <ellipse cx="200" cy="215" rx="14" ry="28" fill="#DDA0DD" stroke="#222" stroke-width="3"/>

  <!-- Sparkle dots on wings -->
  <circle cx="120" cy="190" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="280" cy="190" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="105" cy="275" r="2.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="295" cy="275" r="2.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="150" cy="210" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="250" cy="210" r="2" fill="#FFFFFF" opacity="0.5"/>
</svg>