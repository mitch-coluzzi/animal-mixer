<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Colorful Butterfly/Fairy Wings at mid-body y=180 to y=300, extending x=30 to x=370 -->

  <!-- LEFT WING -->
  <!-- Upper left wing lobe -->
  <path d="M190,215 Q125,170 75,182 Q35,195 50,230 Q68,258 140,248 Q172,238 190,228 Z"
        fill="#FF69B4" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Lower left wing lobe -->
  <path d="M190,228 Q135,250 88,278 Q55,296 75,322 Q95,340 142,312 Q172,286 190,260 Z"
        fill="#87CEEB" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left wing inner details -->
  <path d="M185,220 Q140,190 100,202 Q76,210 90,230 Q110,246 156,236 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>
  <path d="M185,238 Q148,258 116,284 Q98,298 112,312 Q130,314 156,290 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>

  <!-- RIGHT WING -->
  <!-- Upper right wing lobe -->
  <path d="M210,215 Q275,170 325,182 Q365,195 350,230 Q332,258 260,248 Q228,238 210,228 Z"
        fill="#FF69B4" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Lower right wing lobe -->
  <path d="M210,228 Q265,250 312,278 Q345,296 325,322 Q305,340 258,312 Q228,286 210,260 Z"
        fill="#87CEEB" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right wing inner details -->
  <path d="M215,220 Q260,190 300,202 Q324,210 310,230 Q290,246 244,236 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>
  <path d="M215,238 Q252,258 284,284 Q302,298 288,312 Q270,314 244,290 Z"
        fill="#DDA0DD" stroke="#333" stroke-width="2" opacity="0.7"/>

  <!-- Wing body/center attachment -->
  <ellipse cx="200" cy="238" rx="14" ry="28" fill="#DDA0DD" stroke="#222" stroke-width="3"/>

  <!-- Sparkle dots on wings -->
  <circle cx="110" cy="210" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="290" cy="210" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="98" cy="292" r="2.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="302" cy="292" r="2.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="148" cy="232" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="252" cy="232" r="2" fill="#FFFFFF" opacity="0.5"/>
</svg>