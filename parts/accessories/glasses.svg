<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Round Funny Glasses at eye level y=100 to y=140, ~120px wide centered at x=200 -->
  <!-- Left lens -->
  <circle cx="165" cy="120" r="30" fill="#AADDFF" opacity="0.45" stroke="#222" stroke-width="4"/>
  <!-- Right lens -->
  <circle cx="235" cy="120" r="30" fill="#AADDFF" opacity="0.45" stroke="#222" stroke-width="4"/>
  <!-- Bridge between lenses -->
  <path d="M195,120 Q200,128 205,120" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <!-- Left temple arm -->
  <path d="M135,120 Q115,118 100,124" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right temple arm -->
  <path d="M265,120 Q285,118 300,124" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lens shine left -->
  <ellipse cx="155" cy="110" rx="9" ry="5" fill="#FFFFFF" opacity="0.6" transform="rotate(-20,155,110)"/>
  <!-- Lens shine right -->
  <ellipse cx="225" cy="110" rx="9" ry="5" fill="#FFFFFF" opacity="0.6" transform="rotate(-20,225,110)"/>
  <!-- Nose bump detail -->
  <circle cx="200" cy="130" r="3" fill="none" stroke="#222" stroke-width="2" opacity="0.4"/>
</svg>