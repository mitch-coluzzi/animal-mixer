<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Cute Pink Hair Bow at top of head y=15 to y=55 -->
  <!-- Left loop -->
  <path d="M200,38 Q148,15 138,30 Q128,50 200,48 Z"
        fill="#FF69B4" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right loop -->
  <path d="M200,38 Q252,15 262,30 Q272,50 200,48 Z"
        fill="#FF69B4" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Left tail ribbon -->
  <path d="M200,48 Q158,58 146,52 Q142,68 164,62"
        fill="#E0559E" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Right tail ribbon -->
  <path d="M200,48 Q242,58 254,52 Q258,68 236,62"
        fill="#E0559E" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Center knot -->
  <ellipse cx="200" cy="42" rx="12" ry="10" fill="#E0559E" stroke="#222" stroke-width="3"/>
  <!-- Highlight dots -->
  <circle cx="163" cy="28" r="4" fill="#FFB6D9" opacity="0.7"/>
  <circle cx="237" cy="28" r="4" fill="#FFB6D9" opacity="0.7"/>
  <circle cx="200" cy="38" r="2.5" fill="#FFB6D9" opacity="0.6"/>
</svg>