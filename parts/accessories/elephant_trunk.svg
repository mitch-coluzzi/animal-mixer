  <path d="M200,150 Q203,170 207,190 Q212,215 216,235 Q220,250 212,258 Q200,268 188,260 Q178,252 180,242 Q178,230 182,215 Q186,195 190,175 Q194,160 200,150 Z"
        fill="#C8A87A" stroke="none"/>
  <!-- Trunk outline -->
