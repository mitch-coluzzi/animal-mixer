        fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trunk wrinkle lines -->
  <path d="M193,178 Q200,181 208,177" fill="none" stroke="#A08860" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M190,200 Q199,204 209,199" fill="none" stroke="#A08860" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M186,225 Q196,229 212,224" fill="none" stroke="#A08860" stroke-width="2.5" stroke-linecap="round"/>
