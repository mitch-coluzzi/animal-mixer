<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Row of Dragon Spikes running down the spine from y=80 to y=350 -->
  <!-- Spike 1 - top/biggest -->
  <polygon points="200,80 185,115 215,115" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,80 192,105 208,105" fill="#FF6347" stroke="none"/>

  <!-- Spike 2 -->
  <polygon points="200,115 183,155 217,155" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,115 191,145 209,145" fill="#FF6347" stroke="none"/>

  <!-- Spike 3 -->
  <polygon points="200,150 184,188 216,188" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,150 192,178 208,178" fill="#FF6347" stroke="none"/>

  <!-- Spike 4 -->
  <polygon points="200,183 185,218 215,218" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,183 192,210 208,210" fill="#FF6347" stroke="none"/>

  <!-- Spike 5 -->
  <polygon points="200,215 186,248 214,248" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,215 193,240 207,240" fill="#FF6347" stroke="none"/>

  <!-- Spike 6 -->
  <polygon points="200,245 187,275 213,275" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,245 193,268 207,268" fill="#FF6347" stroke="none"/>

  <!-- Spike 7 -->
  <polygon points="200,272 188,300 212,300" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,272 194,294 206,294" fill="#FF6347" stroke="none"/>

  <!-- Spike 8 - smaller toward tail -->
  <polygon points="200,298 189,322 211,322" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,298 194,316 206,316" fill="#FF6347" stroke="none"/>

  <!-- Spike 9 - smallest -->
  <polygon points="200,320 191,342 209,342" fill="#FF4500" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="200,320 195,338 205,338" fill="#FF6347" stroke="none"/>
</svg>