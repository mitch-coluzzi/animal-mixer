<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Dragon/Moose Horns - branching from upper head/shoulder area -->

  <!-- Left horn - main branch -->
  <path d="M115,85 C95,60 75,35 60,5" fill="none" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>
  <path d="M115,85 C95,60 75,35 60,5" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <!-- Left horn - branch 1 -->
  <path d="M90,50 C70,40 55,35 40,25" fill="none" stroke="#FF4500" stroke-width="6" stroke-linecap="round"/>
  <path d="M90,50 C70,40 55,35 40,25" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left horn - branch 2 -->
  <path d="M80,35 C67,18 53,10 38,0" fill="none" stroke="#FF4500" stroke-width="5" stroke-linecap="round"/>
  <path d="M80,35 C67,18 53,10 38,0" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Left horn - tip spikes -->
  <polygon points="60,5 53,-15 67,-5" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="40,25 27,10 43,15" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="38,0 26,-18 42,-10" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Left horn base plate -->
  <ellipse cx="120" cy="88" rx="18" ry="12" fill="#FF4500" stroke="#222" stroke-width="3" transform="rotate(-15,120,88)"/>
  <ellipse cx="120" cy="88" rx="10" ry="7" fill="#FF6347" stroke="none" transform="rotate(-15,120,88)"/>

  <!-- Right horn - main branch (mirrored) -->
  <path d="M285,85 C305,60 325,35 340,5" fill="none" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>
  <path d="M285,85 C305,60 325,35 340,5" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <!-- Right horn - branch 1 -->
  <path d="M310,50 C330,40 345,35 360,25" fill="none" stroke="#FF4500" stroke-width="6" stroke-linecap="round"/>
  <path d="M310,50 C330,40 345,35 360,25" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right horn - branch 2 -->
  <path d="M320,35 C333,18 347,10 362,0" fill="none" stroke="#FF4500" stroke-width="5" stroke-linecap="round"/>
  <path d="M320,35 C333,18 347,10 362,0" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Right horn - tip spikes -->
  <polygon points="340,5 347,-15 333,-5" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="360,25 373,10 357,15" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="362,0 374,-18 358,-10" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right horn base plate -->
  <ellipse cx="280" cy="88" rx="18" ry="12" fill="#FF4500" stroke="#222" stroke-width="3" transform="rotate(15,280,88)"/>
  <ellipse cx="280" cy="88" rx="10" ry="7" fill="#FF6347" stroke="none" transform="rotate(15,280,88)"/>
</svg>
