<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Dragon/Moose Horns - branching from shoulders/upper sides -->

  <!-- Left horn - main branch -->
  <path d="M120,155 C100,130 80,100 65,65" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <path d="M120,155 C100,130 80,100 65,65" fill="none" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>
  <!-- Left horn - branch 1 -->
  <path d="M95,115 C75,105 60,100 45,90" fill="none" stroke="#FF4500" stroke-width="6" stroke-linecap="round"/>
  <path d="M95,115 C75,105 60,100 45,90" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left horn - branch 2 -->
  <path d="M85,100 C72,80 58,72 42,58" fill="none" stroke="#FF4500" stroke-width="5" stroke-linecap="round"/>
  <path d="M85,100 C72,80 58,72 42,58" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Left horn - tip spikes -->
  <polygon points="65,65 58,42 72,52" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="45,90 32,72 48,78" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="42,58 30,38 46,46" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Left horn base plate -->
  <ellipse cx="125" cy="158" rx="18" ry="12" fill="#FF4500" stroke="#222" stroke-width="3" transform="rotate(-15,125,158)"/>
  <ellipse cx="125" cy="158" rx="10" ry="7" fill="#FF6347" stroke="none" transform="rotate(-15,125,158)"/>

  <!-- Right horn - main branch (mirrored) -->
  <path d="M280,155 C300,130 320,100 335,65" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <path d="M280,155 C300,130 320,100 335,65" fill="none" stroke="#FF4500" stroke-width="8" stroke-linecap="round"/>
  <!-- Right horn - branch 1 -->
  <path d="M305,115 C325,105 340,100 355,90" fill="none" stroke="#FF4500" stroke-width="6" stroke-linecap="round"/>
  <path d="M305,115 C325,105 340,100 355,90" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right horn - branch 2 -->
  <path d="M315,100 C328,80 342,72 358,58" fill="none" stroke="#FF4500" stroke-width="5" stroke-linecap="round"/>
  <path d="M315,100 C328,80 342,72 358,58" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Right horn - tip spikes -->
  <polygon points="335,65 342,42 328,52" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="355,90 368,72 352,78" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="358,58 370,38 354,46" fill="#FF6347" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right horn base plate -->
  <ellipse cx="275" cy="158" rx="18" ry="12" fill="#FF4500" stroke="#222" stroke-width="3" transform="rotate(15,275,158)"/>
  <ellipse cx="275" cy="158" rx="10" ry="7" fill="#FF6347" stroke="none" transform="rotate(15,275,158)"/>
</svg>
