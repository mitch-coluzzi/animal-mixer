<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Long Pink Frog Tongue sticking out from mouth y=220 down to y=340 -->
  <!-- Tongue base at mouth -->
  <ellipse cx="200" cy="222" rx="16" ry="8" fill="#FF6B8A" stroke="#222" stroke-width="3"/>
  <!-- Main tongue body -->
  <path d="M186,222
           Q183,240 181,260
           Q178,285 184,308
           Q190,322 200,328
           Q210,322 216,308
           Q222,285 219,260
           Q217,240 214,222"
        fill="#FF6B8A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Center line of tongue -->
  <path d="M200,228 Q200,270 200,315" fill="none" stroke="#E0506E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tongue tip - rounded fork -->
  <path d="M195,322 Q189,335 184,340" fill="none" stroke="#FF6B8A" stroke-width="6" stroke-linecap="round"/>
  <path d="M205,322 Q211,335 216,340" fill="none" stroke="#FF6B8A" stroke-width="6" stroke-linecap="round"/>
  <path d="M195,322 Q189,335 184,340" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <path d="M205,322 Q211,335 216,340" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Wet shine highlights -->
  <ellipse cx="194" cy="255" rx="4" ry="10" fill="#FFFFFF" opacity="0.4" transform="rotate(-5,194,255)"/>
  <ellipse cx="206" cy="290" rx="3" ry="8" fill="#FFFFFF" opacity="0.35" transform="rotate(5,206,290)"/>
  <!-- Saliva drip -->
  <ellipse cx="200" cy="335" rx="3" ry="5" fill="#FF8DA6" opacity="0.5"/>
</svg>
