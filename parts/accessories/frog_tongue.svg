<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Long Pink Frog Tongue sticking out from mouth area -->
  <!-- Tongue base at mouth -->
  <ellipse cx="200" cy="270" rx="16" ry="8" fill="#FF6B8A" stroke="#222" stroke-width="3"/>
  <!-- Main tongue body - curling out and down -->
  <path d="M188,270
           Q185,290 182,310
           Q178,340 185,365
           Q192,385 200,390
           Q208,385 215,365
           Q222,340 218,310
           Q215,290 212,270"
        fill="#FF6B8A" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Center line of tongue -->
  <path d="M200,275 Q200,310 200,370" fill="none" stroke="#E0506E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tongue tip - rounded fork -->
  <path d="M195,385 Q190,400 185,405" fill="none" stroke="#FF6B8A" stroke-width="6" stroke-linecap="round"/>
  <path d="M205,385 Q210,400 215,405" fill="none" stroke="#FF6B8A" stroke-width="6" stroke-linecap="round"/>
  <path d="M195,385 Q190,400 185,405" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <path d="M205,385 Q210,400 215,405" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Wet shine highlights -->
  <ellipse cx="195" cy="300" rx="4" ry="10" fill="#FFFFFF" opacity="0.4" transform="rotate(-5,195,300)"/>
  <ellipse cx="205" cy="340" rx="3" ry="8" fill="#FFFFFF" opacity="0.35" transform="rotate(5,205,340)"/>
  <!-- Saliva drip -->
  <ellipse cx="200" cy="395" rx="3" ry="5" fill="#FF8DA6" opacity="0.5"/>
</svg>