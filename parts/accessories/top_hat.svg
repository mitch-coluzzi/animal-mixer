<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Classic Black Top Hat - sitting on top of head y=0 to y=60 -->
  <!-- Hat brim (ellipse) -->
  <ellipse cx="200" cy="56" rx="78" ry="14" fill="#1a1a1a" stroke="#222" stroke-width="3.5"/>
  <!-- Hat body (tall rectangle with slight taper) -->
  <path d="M155,56 L160,8 Q200,3 240,8 L245,56 Z"
        fill="#2a2a2a" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Hat top -->
  <ellipse cx="200" cy="8" rx="42" ry="9" fill="#333333" stroke="#222" stroke-width="3"/>
  <!-- Red band -->
  <rect x="155" y="40" width="90" height="14" rx="2" fill="#CC0000" stroke="#222" stroke-width="2"/>
  <!-- Band buckle -->
  <rect x="190" y="38" width="20" height="18" rx="2" fill="#FFD700" stroke="#222" stroke-width="2"/>
  <rect x="194" y="42" width="12" height="10" rx="1" fill="#CC0000" stroke="#222" stroke-width="1.5"/>
  <!-- Shine highlight -->
  <path d="M168,18 Q171,28 169,38" fill="none" stroke="#555" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
</svg>