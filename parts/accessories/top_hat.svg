<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Classic Black Top Hat with band -->
  <!-- Hat brim (ellipse) -->
  <ellipse cx="200" cy="105" rx="75" ry="14" fill="#1a1a1a" stroke="#222" stroke-width="3.5"/>
  <!-- Hat body (tall rectangle with slight taper) -->
  <path d="M160,105 L165,42 Q200,38 235,42 L240,105 Z"
        fill="#2a2a2a" stroke="#222" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Hat top -->
  <ellipse cx="200" cy="42" rx="37" ry="8" fill="#333333" stroke="#222" stroke-width="3"/>
  <!-- Band -->
  <rect x="160" y="85" width="80" height="14" rx="2" fill="#CC0000" stroke="#222" stroke-width="2"/>
  <!-- Band buckle -->
  <rect x="190" y="83" width="20" height="18" rx="2" fill="#FFD700" stroke="#222" stroke-width="2"/>
  <rect x="194" y="87" width="12" height="10" rx="1" fill="#CC0000" stroke="#222" stroke-width="1.5"/>
  <!-- Shine highlight -->
  <path d="M172,55 Q175,70 173,80" fill="none" stroke="#555" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
</svg>