<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Knight Armored Legs - Cartoon Style -->

  <!-- === LEFT LEG === -->
  <!-- Upper leg / thigh plate -->
  <path d="M130,320 L185,320 L182,395 L133,395 Z" fill="#B0B0B0" stroke="#333" stroke-width="3.5"/>
  <!-- Thigh highlight -->
  <path d="M148,328 L147,388" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Thigh rivet -->
  <circle cx="157" cy="345" r="3.5" fill="#808080" stroke="#333" stroke-width="1.5"/>

  <!-- Gold knee guard - left -->
  <ellipse cx="157" cy="398" rx="30" ry="16" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <ellipse cx="157" cy="398" rx="16" ry="9" fill="#FFEC80" stroke="#333" stroke-width="1.5"/>

  <!-- Lower leg / shin plate -->
  <path d="M135,412 L180,412 L178,455 L137,455 Z" fill="#B0B0B0" stroke="#333" stroke-width="3.5"/>
  <!-- Shin highlight -->
  <path d="M150,418 L149,450" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Boot - left -->
  <path d="M130,452 L185,452 L188,468 C190,475 190,480 185,484 L128,484 C122,480 120,475 122,468 Z" fill="#B0B0B0" stroke="#333" stroke-width="3.5"/>
  <!-- Boot toe -->
  <path d="M122,478 L110,475 C105,473 104,468 108,465 L130,460" fill="#B0B0B0" stroke="#333" stroke-width="3"/>
  <!-- Boot sole -->
  <path d="M108,476 L185,486 C188,487 188,490 185,490 L106,482 C103,481 103,478 106,477 Z" fill="#8B4513" stroke="#333" stroke-width="2.5"/>
  <!-- Boot gold trim -->
  <path d="M132,455 L183,455" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Boot rivet -->
  <circle cx="157" cy="470" r="3" fill="#808080" stroke="#333" stroke-width="1.5"/>


  <!-- === RIGHT LEG === -->
  <!-- Upper leg / thigh plate -->
  <path d="M215,320 L270,320 L267,395 L218,395 Z" fill="#B0B0B0" stroke="#333" stroke-width="3.5"/>
  <!-- Thigh highlight -->
  <path d="M233,328 L232,388" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Thigh rivet -->
  <circle cx="242" cy="345" r="3.5" fill="#808080" stroke="#333" stroke-width="1.5"/>

  <!-- Gold knee guard - right -->
  <ellipse cx="242" cy="398" rx="30" ry="16" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <ellipse cx="242" cy="398" rx="16" ry="9" fill="#FFEC80" stroke="#333" stroke-width="1.5"/>

  <!-- Lower leg / shin plate -->
  <path d="M220,412 L265,412 L263,455 L222,455 Z" fill="#B0B0B0" stroke="#333" stroke-width="3.5"/>
  <!-- Shin highlight -->
  <path d="M235,418 L234,450" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Boot - right -->
  <path d="M215,452 L270,452 L273,468 C275,475 275,480 270,484 L213,484 C207,480 205,475 207,468 Z" fill="#B0B0B0" stroke="#333" stroke-width="3.5"/>
  <!-- Boot toe -->
  <path d="M273,478 L285,475 C290,473 291,468 287,465 L265,460" fill="#B0B0B0" stroke="#333" stroke-width="3"/>
  <!-- Boot sole -->
  <path d="M210,486 L287,476 C290,477 290,480 287,481 L210,490 C207,490 207,487 210,486 Z" fill="#8B4513" stroke="#333" stroke-width="2.5"/>
  <!-- Boot gold trim -->
  <path d="M217,455 L268,455" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Boot rivet -->
  <circle cx="242" cy="470" r="3" fill="#808080" stroke="#333" stroke-width="1.5"/>
</svg>