<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Flamingo Legs - long, thin, funny stick legs -->
  <!-- Left leg - with slight wobble and knee bend -->
  <path d="M160,330 C158,345 155,360 157,380 C159,395 155,410 153,430 C151,450 150,465 150,475" fill="none" stroke="#FF69B4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left leg outline for thickness -->
  <path d="M160,330 C158,345 155,360 157,380 C159,395 155,410 153,430 C151,450 150,465 150,475" fill="none" stroke="#2B2B2B" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
