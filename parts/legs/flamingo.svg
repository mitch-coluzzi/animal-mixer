  <!-- Left knee bump -->
  <circle cx="157" cy="380" r="6" fill="#FF1493" stroke="#2B2B2B" stroke-width="2.5"/>
  <!-- Left foot -->
  <path d="M135,475 C138,470 145,468 150,475 C155,468 162,470 165,475 C165,480 160,485 150,485 C140,485 135,480 135,475 Z" fill="#FF1493" stroke="#2B2B2B" stroke-width="3" stroke-linejoin="round"/>
  <!-- Left foot toes -->
  <line x1="140" y1="480" x2="133" y2="486" stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="150" y1="482" x2="150" y2="490" stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="480" x2="167" y2="486" stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right leg -->
  <path d="M240,330 C242,345 245,360 243,380 C241,395 245,410 247,430 C249,450 250,465 250,475" fill="none" stroke="#2B2B2B" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
