  <!-- Right knee bump -->
  <circle cx="243" cy="380" r="6" fill="#FF1493" stroke="#2B2B2B" stroke-width="2.5"/>
  <!-- Right foot -->
  <path d="M235,475 C238,470 245,468 250,475 C255,468 262,470 265,475 C265,480 260,485 250,485 C240,485 235,480 235,475 Z" fill="#FF1493" stroke="#2B2B2B" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right foot toes -->
  <line x1="240" y1="480" x2="233" y2="486" stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="250" y1="482" x2="250" y2="490" stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="480" x2="267" y2="486" stroke="#2B2B2B" stroke-width="2.5" stroke-linecap="round"/>
</svg>
