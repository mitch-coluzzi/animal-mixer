<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Snowy sky -->
  <rect width="400" height="500" fill="#B0C4DE"/>

  <!-- Snow mounds at bottom -->
  <path d="M0 410 Q40 380 100 400 Q160 375 220 395 Q280 370 340 390 Q380 380 400 385 L400 500 L0 500 Z" fill="#F0F4F8" stroke="#222" stroke-width="3.5"/>
  <path d="M0 440 Q60 420 130 435 Q200 415 270 430 Q340 418 400 425 L400 500 L0 500 Z" fill="white" stroke="#222" stroke-width="3"/>
  <path d="M0 465 Q100 450 200 460 Q300 448 400 458 L400 500 L0 500 Z" fill="#FAFCFF" stroke="#222" stroke-width="2.5"/>

  <!-- Snowflakes - various sizes scattered around -->
  <!-- Snowflake helper: each is a small star shape -->

  <!-- Snowflake 1 -->
  <g transform="translate(50, 60)" stroke="#FFF" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-7" y1="-4" x2="7" y2="4"/>
    <line x1="-7" y1="4" x2="7" y2="-4"/>
  </g>

  <!-- Snowflake 2 -->
  <g transform="translate(150, 100)" stroke="#FFF" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <line x1="-5" y1="-3" x2="5" y2="3"/>
    <line x1="-5" y1="3" x2="5" y2="-3"/>
  </g>

  <!-- Snowflake 3 -->
  <g transform="translate(300, 70)" stroke="#FFF" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="-9" x2="0" y2="9"/>
    <line x1="-8" y1="-4" x2="8" y2="4"/>
    <line x1="-8" y1="4" x2="8" y2="-4"/>
  </g>

  <!-- Snowflake 4 -->
  <g transform="translate(80, 200)" stroke="#E8EFF5" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <line x1="-5" y1="-3" x2="5" y2="3"/>
    <line x1="-5" y1="3" x2="5" y2="-3"/>
  </g>

  <!-- Snowflake 5 -->
  <g transform="translate(250, 180)" stroke="#FFF" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="-7" x2="0" y2="7"/>
    <line x1="-6" y1="-3.5" x2="6" y2="3.5"/>
    <line x1="-6" y1="3.5" x2="6" y2="-3.5"/>
  </g>

  <!-- Snowflake 6 -->
  <g transform="translate(370, 160)" stroke="#E8EFF5" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-5" x2="0" y2="5"/>
    <line x1="-4" y1="-2.5" x2="4" y2="2.5"/>
    <line x1="-4" y1="2.5" x2="4" y2="-2.5"/>
  </g>

  <!-- Snowflake 7 -->
  <g transform="translate(180, 280)" stroke="#FFF" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-7" x2="0" y2="7"/>
    <line x1="-6" y1="-3.5" x2="6" y2="3.5"/>
    <line x1="-6" y1="3.5" x2="6" y2="-3.5"/>
  </g>

  <!-- Snowflake 8 -->
  <g transform="translate(30, 330)" stroke="#FFF" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-5" x2="0" y2="5"/>
    <line x1="-4" y1="-2.5" x2="4" y2="2.5"/>
    <line x1="-4" y1="2.5" x2="4" y2="-2.5"/>
  </g>

  <!-- Snowflake 9 -->
  <g transform="translate(340, 300)" stroke="#E8EFF5" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-7" y1="-4" x2="7" y2="4"/>
    <line x1="-7" y1="4" x2="7" y2="-4"/>
  </g>

  <!-- Snowflake 10 - small dots for distant snowflakes -->
  <circle cx="120" cy="150" r="3" fill="white"/>
  <circle cx="200" cy="50" r="2.5" fill="white"/>
  <circle cx="350" cy="240" r="2" fill="white"/>
  <circle cx="60" cy="270" r="2.5" fill="white"/>
  <circle cx="280" cy="350" r="3" fill="white"/>
  <circle cx="150" cy="370" r="2" fill="white"/>
  <circle cx="380" cy="380" r="2.5" fill="white"/>
  <circle cx="100" cy="390" r="2" fill="white"/>
</svg>